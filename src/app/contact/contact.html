 <p-divider layout="horizontal"  align="center"><b>OR</b></p-divider>

 
  <div>
    <h2>Send me a message!</h2>
      <p-card class="profile-card">
          <div class="form-grid">

          <div class="field">
           <label>Name</label>

          <input
          type="text"
          pInputText
          placeholder="Priya p."
          class="w-full"
          />
          </div>

        <div class="field">
        <label>Email</label>

      <input
        type="email"
        pInputText
        placeholder="priyanityasri002@gmail.com"
        class="w-full"
        />
       </div>
       </div>


        <div class="field mt-3">
       <label>Subject</label>

       <input
          type="text"
          pInputText
         placeholder="Job opportunity..."
         class="w-full"
        />
       </div>
  
     <!-- Message -->
      <div class="field mt-3">
      <label>Message</label>

       <textarea
        pInputTextarea
        rows="6"
        placeholder="Hi, I'd love to connect about..."
        class="w-full">
      </textarea>
      </div>

       <button
        pButton
        type="button"
        label="Send Message"
        icon="pi pi-send"
        (click)="openmail()"
        class="w-full mt-4 send-btn">
       </button>


      </p-card>
  </div>
